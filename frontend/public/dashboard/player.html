<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TennisIQ — Player Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#E9E5DC;--bg-alt:#DDD9CF;--ink:#1A2634;--ink-mid:#3D4F5E;--ink-soft:#7A8A96;--accent:#4A7C6F;--accent-light:#6FAF9E;--warm:#C4A97D;--card-bg:#F4F1EB;--card-dark:#243447;--border:rgba(26,38,52,0.1);--red-soft:#C4573A;}
*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;font-weight:300;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;padding:0 52px;height:74px;background:rgba(233,229,220,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);}.logo-mark{width:38px;height:38px;background:var(--ink);border-radius:50%;position:relative;overflow:hidden;}.logo-mark::before{content:'';position:absolute;width:21px;height:21px;border:2.5px solid var(--bg);border-radius:50%;clip-path:polygon(0 0,50% 0,50% 100%,0 100%);top:50%;left:50%;transform:translate(-50%,-50%);}.logo-mark::after{content:'';position:absolute;width:17px;height:1.5px;background:var(--bg);transform:rotate(-35deg);top:50%;left:50%;margin-left:-8px;}.logo-text{font-family:'Playfair Display',serif;font-size:18px;}
.nav-center{flex:1;display:flex;justify-content:center;padding:0 32px;}.search-wrap{position:relative;width:360px;}.search-bar{display:flex;align-items:center;background:var(--card-bg);border:1.5px solid var(--border);border-radius:100px;padding:0 20px;gap:10px;width:100%;height:42px;}.search-bar:hover,.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,124,111,0.08);}.search-bar input{border:none;background:transparent;outline:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);width:100%;font-weight:400;}.search-bar input::placeholder{color:var(--ink-soft);}
.sdd{position:absolute;top:48px;left:0;right:0;background:var(--card-bg);border:1.5px solid var(--border);border-radius:12px;box-shadow:0 12px 32px rgba(26,38,52,0.12);display:none;overflow:hidden;z-index:200;}.sdd.open{display:block;}.si{padding:10px 18px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;}.si:hover,.si.sel{background:var(--bg-alt);}.si .sm{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-soft);}
.nav-links{display:flex;align-items:center;gap:32px;}.nav-links a{text-decoration:none;color:var(--ink-mid);font-size:14px;}.nav-links a:hover{color:var(--ink);}.cmp-cta{background:var(--accent)!important;color:var(--card-bg)!important;padding:9px 20px;border-radius:100px;font-size:13.5px;box-shadow:0 0 14px rgba(74,124,111,0.3);}
.page{padding-top:74px;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;padding:32px 5% 24px 9%;gap:24px;min-height:22vh;}
.hero-left{display:flex;gap:20px;align-items:flex-start;}.avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--accent-light),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:26px;color:white;font-weight:700;flex-shrink:0;box-shadow:0 4px 16px rgba(74,124,111,0.3);}
.pinfo h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;margin-bottom:4px;}.meta-row{display:flex;align-items:center;gap:12px;margin-bottom:3px;flex-wrap:wrap;}.mtag{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--ink-soft);display:flex;align-items:center;gap:4px;}.mtag .dot{width:4px;height:4px;border-radius:50%;background:var(--accent);}.rank-row{display:flex;align-items:baseline;gap:6px;margin-top:6px;}.rnum{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--accent);}.rlbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-soft);letter-spacing:0.08em;text-transform:uppercase;}
.ins-box{background:var(--card-bg);border-radius:14px;padding:24px 28px;border:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;}.ins-hdr{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px;}.ins-hdr::after{content:'';flex:1;height:1px;background:var(--border);}.ins-item{font-size:13.5px;color:var(--ink-mid);line-height:1.65;margin-bottom:10px;padding-left:14px;border-left:2px solid var(--accent);}.ins-item strong{color:var(--ink);font-weight:500;}.ins-item.opp{border-left-color:var(--red-soft);}.ins-item.err{border-left-color:var(--warm);}
.sf-bar{position:sticky;top:74px;z-index:90;display:flex;align-items:center;justify-content:center;padding:12px 9%;background:rgba(233,229,220,0.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);gap:10px;}.sfb{font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;padding:7px 22px;border-radius:100px;border:1.5px solid var(--border);background:transparent;color:var(--ink-mid);cursor:pointer;}.sfb.on{background:var(--ink);color:var(--bg);border-color:var(--ink);}.sf-cmp{margin-left:28px;font-size:12px;padding:7px 20px;border-radius:100px;background:var(--accent);color:var(--card-bg);border:none;cursor:pointer;box-shadow:0 0 12px rgba(74,124,111,0.25);}
.tr-grid{display:grid;grid-template-columns:300px 1fr;gap:24px;padding:28px 5% 28px 9%;}.tiles{display:flex;flex-direction:column;gap:12px;}.tile{background:var(--card-dark);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}.tile::after{content:'';position:absolute;top:0;right:0;width:50%;height:100%;background:linear-gradient(135deg,transparent,rgba(74,124,111,0.05));pointer-events:none;}.tl{font-family:'DM Mono',monospace;font-size:8.5px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;}.tv{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:white;margin-bottom:2px;}.tsub{font-size:10.5px;color:rgba(255,255,255,0.5);}.trk{position:absolute;top:14px;right:16px;font-family:'DM Mono',monospace;font-size:9px;color:var(--accent-light);}
.radar-box{background:var(--card-dark);border-radius:14px;display:flex;align-items:center;justify-content:center;min-height:300px;padding:20px;position:relative;}.ri-btn{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.4);font-family:'DM Mono',monospace;font-size:10px;z-index:2;}.ri-tip{position:absolute;top:40px;right:12px;background:var(--card-bg);border-radius:10px;padding:14px;width:280px;font-size:11px;line-height:1.6;color:var(--ink-mid);box-shadow:0 8px 24px rgba(26,38,52,0.15);display:none;z-index:10;border:1px solid var(--border);}.ri-tip.show{display:block;}.ri-tip b{color:var(--ink);font-weight:500;display:block;margin-top:6px;}
.sec-pad{padding:0 5% 24px 9%;}.card-box{background:var(--card-bg);border-radius:14px;padding:20px 22px;border:1px solid var(--border);}.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}.cl{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:0.1em;text-transform:uppercase;}
.srv-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}.srv-b{background:var(--bg-alt);border-radius:8px;padding:14px;text-align:center;}.srv-d{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-soft);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;}.srv-v{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}.srv-dt{font-family:'DM Mono',monospace;font-size:9px;margin-top:2px;}.du{color:var(--accent);}.dd{color:var(--red-soft);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:0 5% 28px 9%;}.tgrp{display:flex;gap:5px;}.tog{font-family:'DM Mono',monospace;font-size:9px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--ink-soft);cursor:pointer;}.tog.on{background:var(--accent);color:white;border-color:var(--accent);}.pr{display:grid;grid-template-columns:1fr 80px 55px;padding:9px 0;border-bottom:1px solid var(--border);align-items:center;font-size:12.5px;}.pr:last-child{border-bottom:none;}.pbw{height:5px;background:var(--bg-alt);border-radius:3px;overflow:hidden;}.pb{height:100%;border-radius:3px;background:var(--accent);}.pp{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-mid);text-align:right;}
.legend{display:flex;gap:16px;align-items:center;margin-bottom:14px;}.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-mid);}.lsw{width:14px;height:5px;border-radius:2px;}.lln{width:14px;height:3px;border-radius:1px;}.asec{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-soft);letter-spacing:0.1em;text-transform:uppercase;margin:14px 0 8px;}.asec:first-of-type{margin-top:0;}.ar{display:grid;grid-template-columns:130px 1fr 50px;padding:7px 0;align-items:center;gap:8px;}.albl{font-size:12px;color:var(--ink-mid);}.abw{height:12px;background:var(--bg-alt);border-radius:6px;overflow:visible;position:relative;}.abf{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:6px;opacity:0.8;}.aam{position:absolute;top:-2px;width:3px;height:16px;background:var(--red-soft);border-radius:1.5px;}.aval{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink);text-align:right;}
.deep-sec{padding:0 5% 28px 9%;}.sit-grp{margin-bottom:14px;}.sit-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:0.08em;margin-bottom:6px;font-weight:500;}.sit-row{display:grid;grid-template-columns:180px 80px 80px 80px;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11.5px;align-items:center;}.sit-row:last-child{border-bottom:none;}.sit-head{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;}.sit-d.pos{color:var(--accent);font-weight:500;}.sit-d.neg{color:var(--red-soft);font-weight:500;}.sit-grp.hid{display:none;}
.opp-item{font-size:12.5px;color:var(--ink-mid);line-height:1.6;margin-bottom:8px;padding-left:12px;border-left:2px solid var(--red-soft);}.err-item{font-size:12px;color:var(--ink-mid);line-height:1.5;margin-bottom:6px;padding-left:12px;border-left:2px solid var(--warm);}
.sp1-grid{display:grid;grid-template-columns:120px 80px 80px;gap:6px;font-size:11.5px;}.sp1-head{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;}
.sfr{display:flex;gap:12px;padding:12px 14px;background:var(--bg-alt);border-radius:10px;margin-bottom:8px;align-items:center;}.sfn{font-weight:500;font-size:13px;width:70px;flex-shrink:0;}.sfs{text-align:center;flex:1;}.sfs .sl2{font-family:'DM Mono',monospace;font-size:8px;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;}.sfs .sv2{font-size:14px;font-weight:500;}.sfm{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-soft);width:100px;text-align:right;flex-shrink:0;}
.ov{position:fixed;inset:0;background:rgba(26,38,52,0.6);backdrop-filter:blur(4px);z-index:500;display:none;align-items:center;justify-content:center;}.ov.show{display:flex;}.ov-card{background:var(--bg);border-radius:20px;width:90%;max-width:1000px;max-height:85vh;overflow-y:auto;padding:32px;position:relative;box-shadow:0 24px 64px rgba(26,38,52,0.2);}.ov-x{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg-alt);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--ink-mid);z-index:10;}.ov-x:hover{background:var(--red-soft);color:white;}.ov-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:20px;}.ov-row{display:grid;grid-template-columns:1fr 40px 1fr;gap:12px;align-items:center;margin-bottom:20px;}.ov-inp{display:flex;align-items:center;background:var(--card-bg);border:1.5px solid var(--border);border-radius:10px;padding:0 14px;height:42px;}.ov-inp input{border:none;background:transparent;outline:none;font-family:'DM Sans',sans-serif;font-size:13px;width:100%;color:var(--ink);}.ov-swap{width:40px;height:40px;border-radius:50%;background:var(--card-bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--ink-mid);}.ov-swap:hover{background:var(--accent);color:white;}
.footer{background:var(--ink);padding:28px 9%;display:flex;align-items:center;justify-content:space-between;margin-top:20px;}.footer-logo{display:flex;align-items:center;gap:10px;color:rgba(233,229,220,.7);font-family:'Playfair Display',serif;font-size:15px;}.footer-note{font-family:'DM Mono',monospace;font-size:10.5px;color:rgba(233,229,220,.3);}
.loading{text-align:center;padding:80px;font-size:14px;color:var(--ink-soft);}.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}@keyframes spin{to{transform:rotate(360deg);}}
.expand-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;padding:8px 0;letter-spacing:0.08em;text-transform:uppercase;}.expand-btn:hover{text-decoration:underline;}.note{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-soft);margin-top:10px;}
</style>
</head>
<body>
<nav><a href="index.html" class="nav-logo"><div class="logo-mark"></div><span class="logo-text">TennisIQ</span></a><div class="nav-center"><div class="search-wrap"><div class="search-bar"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg><input type="text" placeholder="Search a player..." id="sinp" autocomplete="off"/></div><div class="sdd" id="sdd"></div></div></div><div class="nav-links"><a href="#" class="cmp-cta" id="navCmp">Compare Players</a><a href="tournament.html">Tournaments</a><a href="#">About</a></div></nav>
<div class="page" id="app"><div class="loading"><div class="spinner"></div>Loading player data...</div></div>
<div class="ov" id="ov"><div class="ov-card"><div class="ov-x" id="ovX">&#x2715;</div><div class="ov-title">Compare Players</div><div class="ov-row"><div class="ov-inp"><input type="text" placeholder="Player A..." id="ov1"/></div><div class="ov-swap" id="ovSw">&#8644;</div><div class="ov-inp"><input type="text" placeholder="Player B..." id="ov2"/></div></div><div id="ovC"><div style="text-align:center;color:var(--ink-soft);padding:40px;">Enter two names, press Enter.</div></div></div></div>
<script>
const API='http://localhost:8000/api/v2',PN=new URLSearchParams(location.search).get('player')||'Carlos Alcaraz';
function P(v){return(v*100).toFixed(1)+'%';}function ini(n){return n.split(' ').map(w=>w[0]).join('');}
/* Search */
let sT,sR=[],sI=-1;const sinp=document.getElementById('sinp'),sdd=document.getElementById('sdd');
sinp.addEventListener('input',()=>{clearTimeout(sT);const q=sinp.value.trim();if(q.length<2){sdd.classList.remove('open');return;}sT=setTimeout(async()=>{try{const r=await fetch(API+'/search?q='+encodeURIComponent(q));if(!r.ok)return;sR=await r.json();sI=0;if(!sR.length){sdd.classList.remove('open');return;}sdd.innerHTML=sR.map((p,i)=>'<div class="si'+(i===0?' sel':'')+'" data-n="'+p.name+'">'+p.name+'<span class="sm">'+p.matches+' matches</span></div>').join('');sdd.classList.add('open');sdd.querySelectorAll('.si').forEach(it=>it.addEventListener('click',()=>location.href='?player='+encodeURIComponent(it.dataset.n)));}catch(e){}},200);});
sinp.addEventListener('keydown',e=>{if(!sdd.classList.contains('open')){if(e.key==='Enter'&&sinp.value.trim())location.href='?player='+encodeURIComponent(sinp.value.trim());return;}const items=sdd.querySelectorAll('.si');if(e.key==='ArrowDown'){e.preventDefault();sI=Math.min(sI+1,items.length-1);}else if(e.key==='ArrowUp'){e.preventDefault();sI=Math.max(sI-1,0);}else if(e.key==='Enter'){e.preventDefault();if(sI>=0&&items[sI])location.href='?player='+encodeURIComponent(items[sI].dataset.n);return;}else if(e.key==='Escape'){sdd.classList.remove('open');return;}items.forEach((it,i)=>it.classList.toggle('sel',i===sI));});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sdd.classList.remove('open');});
/* Compare overlay */
document.getElementById('navCmp').addEventListener('click',e=>{e.preventDefault();document.getElementById('ov').classList.add('show');document.getElementById('ov1').value=PN;});
document.getElementById('ovX').addEventListener('click',()=>document.getElementById('ov').classList.remove('show'));
document.getElementById('ov').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show');});
document.getElementById('ovSw').addEventListener('click',()=>{const a=document.getElementById('ov1'),b=document.getElementById('ov2'),t=a.value;a.value=b.value;b.value=t;});
[document.getElementById('ov1'),document.getElementById('ov2')].forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v1=document.getElementById('ov1').value.trim(),v2=document.getElementById('ov2').value.trim();if(v1&&v2)loadCmp(v1,v2);}}));
async function loadCmp(n1,n2){const c=document.getElementById('ovC');c.innerHTML='<div class="loading"><div class="spinner"></div></div>';try{const[r1,r2]=await Promise.all([fetch(API+'/player/'+encodeURIComponent(n1)),fetch(API+'/player/'+encodeURIComponent(n2))]);if(!r1.ok||!r2.ok){c.innerHTML='<div style="text-align:center;color:var(--ink-soft);padding:40px;">Not found.</div>';return;}const p1=await r1.json(),p2=await r2.json(),pr1=p1.profile||{},pr2=p2.profile||{},bp1=p1.break_points||{},bp2=p2.break_points||{};const rate=p=>{const pr=p.profile||{},bp=p.break_points||{};return Math.min(99,Math.round(60+(pr.aggression_index||0.5)*15+(pr.win_rate_short_rally||0.5)*12+(bp.saved_pct||0.5)*10+(pr.ace_rate||0.03)*80+(pr.win_rate_far_behind||0.5)*8));};const attrs=[{n:'Ace Rate',v1:pr1.ace_rate||0,v2:pr2.ace_rate||0,mx:.15},{n:'Aggression',v1:pr1.aggression_index||0,v2:pr2.aggression_index||0,mx:1},{n:'Short Rally Win',v1:pr1.win_rate_short_rally||0,v2:pr2.win_rate_short_rally||0,mx:1},{n:'BP Saved',v1:bp1.saved_pct||0,v2:bp2.saved_pct||0,mx:1},{n:'BP Converted',v1:bp1.converted_pct||0,v2:bp2.converted_pct||0,mx:1},{n:'Far Behind Win',v1:pr1.win_rate_far_behind||0,v2:pr2.win_rate_far_behind||0,mx:1}];c.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;"><div style="background:var(--card-dark);border-radius:12px;padding:18px;text-align:center;color:white;"><div style="font-family:Playfair Display,serif;font-size:18px;font-weight:700;">'+p1.name+'</div><div style="font-family:DM Mono,monospace;font-size:10px;color:rgba(255,255,255,0.5);margin:4px 0 8px;">'+p1.charted_matches+' matches</div><span style="font-family:Playfair Display,serif;font-size:28px;font-weight:700;color:var(--accent-light);">'+rate(p1)+'</span></div><div style="background:var(--card-dark);border-radius:12px;padding:18px;text-align:center;color:white;"><div style="font-family:Playfair Display,serif;font-size:18px;font-weight:700;">'+p2.name+'</div><div style="font-family:DM Mono,monospace;font-size:10px;color:rgba(255,255,255,0.5);margin:4px 0 8px;">'+p2.charted_matches+' matches</div><span style="font-family:Playfair Display,serif;font-size:28px;font-weight:700;color:var(--red-soft);">'+rate(p2)+'</span></div></div>'+attrs.map(a=>{const w1=Math.min(100,a.v1/a.mx*100),w2=Math.min(100,a.v2/a.mx*100);return'<div style="display:grid;grid-template-columns:50px 1fr 90px 1fr 50px;gap:6px;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);"><div style="font-family:DM Mono,monospace;font-size:12px;text-align:right;color:'+(a.v1>=a.v2?'var(--accent)':'var(--ink-soft)')+';">'+P(a.v1)+'</div><div style="height:7px;background:var(--bg-alt);border-radius:4px;overflow:hidden;position:relative;"><div style="position:absolute;right:0;top:0;height:100%;width:'+w1+'%;background:var(--accent);border-radius:4px;"></div></div><div style="text-align:center;font-size:10.5px;color:var(--ink-mid);">'+a.n+'</div><div style="height:7px;background:var(--bg-alt);border-radius:4px;overflow:hidden;position:relative;"><div style="position:absolute;left:0;top:0;height:100%;width:'+w2+'%;background:var(--red-soft);border-radius:4px;"></div></div><div style="font-family:DM Mono,monospace;font-size:12px;color:'+(a.v2>a.v1?'var(--red-soft)':'var(--ink-soft)')+';">'+P(a.v2)+'</div></div>';}).join('');}catch(e){c.innerHTML='<div style="text-align:center;color:var(--red-soft);padding:40px;">Error.</div>';}}
/* Main */
async function load(){try{const[r1,r2]=await Promise.all([fetch(API+'/player/'+encodeURIComponent(PN)),fetch(API+'/player/'+encodeURIComponent(PN)+'/deep')]);if(!r1.ok)throw 0;const data=await r1.json(),deep=r2.ok?await r2.json():null;render(data,deep);}catch(e){document.getElementById('app').innerHTML='<div class="loading">Player not found. <a href="?player=Carlos+Alcaraz">Try Alcaraz</a></div>';}}
function render(d,deep){
const p=d.profile||{},sv=d.serve_direction||{},serving=d.serving||{},bp=d.break_points||{};
const patD={F:'Forehand',B:'Backhand',S:'Serve',s:'Slice',V:'Volley',Z:'BH Volley',O:'Overhead',r:'FH Slice',H:'FH Drop',J:'BH Drop'};
const dp=pg=>pg.split('').map(c=>patD[c]||c).join(' > ');
const eff=((serving.points_won_pct||0)*0.5+(p.win_rate_short_rally||0.5)*0.3+(bp.saved_pct||0.5)*0.2).toFixed(2);
const radar=[{l:'Serve',v:Math.min(100,(p.ace_rate||0)*800+40),tip:'Ace rate scaled'},{l:'Return',v:Math.min(100,((d.returning||{}).aggression||0.5)*120),tip:'Return aggression'},{l:'BP Save',v:(bp.saved_pct||0.5)*100,tip:'BP save %'},{l:'Aggression',v:Math.min(100,(p.aggression_index||0.5)*140),tip:'Winner/UE ratio'},{l:'Defense',v:Math.min(100,(1-(p.aggression_index||0.5))*140),tip:'Inverse aggression'},{l:'Consistency',v:Math.min(100,(p.pattern_diversity_2gram||4)/5*80),tip:'Pattern diversity'},{l:'Pressure',v:Math.min(100,(p.win_rate_far_behind||0.5)*130),tip:'Far behind win %'}];
const strengths=[{n:dp(p.top_2gram_1||'FF'),v:p.top_2gram_1_pct||0},{n:dp(p.top_2gram_2||'BF'),v:p.top_2gram_2_pct||0},{n:dp(p.top_2gram_3||'BB'),v:p.top_2gram_3_pct||0},{n:'Short rally win (<4)',v:p.win_rate_short_rally||0},{n:'Far ahead win rate',v:p.win_rate_far_ahead||0}];
const weaknesses=[{n:'Long rally win (>8)',v:p.win_rate_long_rally||0},{n:'Far behind win rate',v:p.win_rate_far_behind||0},{n:'Serve predictability',v:1-(p.serve_dir_entropy||0)/1.585},{n:'UE rate',v:serving.unforced_errors?(serving.unforced_errors/serving.n):0},{n:'2nd serve exposure',v:0.4}];
window._str=strengths;window._wk=weaknesses;
// Build insights from deep
let insHTML='';
if(deep){const si=deep.situational_insights||[],oi=deep.opponent_exploits||[],ei=deep.error_analysis||[],ri=deep.return_insights||[];
const top=si.filter(i=>i.type!=='rally_len').slice(0,3);
top.forEach(i=>{const dv=i.delta,ds=Math.abs(dv)<=1?(dv>0?'+':'')+P(dv):(dv>0?'+':'')+dv.toFixed(1);insHTML+='<div class="ins-item"><strong>'+i.situation+':</strong> '+i.detail+' shifts '+ds+' in wins vs losses.</div>';});
if(oi.length)insHTML+='<div class="ins-item opp">'+oi[0].insight+'</div>';
if(ei.length)insHTML+='<div class="ins-item err">'+ei[0].insight+'</div>';
if(ri.length&&insHTML.split('ins-item').length<6)insHTML+='<div class="ins-item">'+ri[0].insight+'</div>';
}else{insHTML='<div class="ins-item">Deep analysis loading...</div>';}
// Situational table
let sitHTML='';
if(deep&&deep.situational_insights.length){const grps={};deep.situational_insights.forEach(i=>{if(!grps[i.situation])grps[i.situation]=[];grps[i.situation].push(i);});
const entries=Object.entries(grps);
sitHTML='<div class="deep-sec"><div class="card-box"><div class="ch"><span class="cl">Situational Analysis: Wins vs Losses</span></div>';
entries.forEach(([sit,items],idx)=>{
sitHTML+='<div class="sit-grp'+(idx>=5?' hid':'')+'"><div class="sit-lbl">'+sit+'</div><div class="sit-row"><div class="sit-head">Detail</div><div class="sit-head">In Wins</div><div class="sit-head">In Losses</div><div class="sit-head">Delta</div></div>';
items.forEach(i=>{const w=typeof i.in_wins==='number'&&i.in_wins<=1?P(i.in_wins):typeof i.in_wins==='number'?i.in_wins.toFixed(1):i.in_wins;const l=typeof i.in_losses==='number'&&i.in_losses<=1?P(i.in_losses):typeof i.in_losses==='number'?i.in_losses.toFixed(1):i.in_losses;const dv=i.delta;const ds=Math.abs(dv)<=1?(dv>0?'+':'')+P(dv):(dv>0?'+':'')+dv.toFixed(1);
sitHTML+='<div class="sit-row"><div style="color:var(--ink-mid);">'+i.detail+'</div><div style="font-family:DM Mono,monospace;font-size:11px;">'+w+'</div><div style="font-family:DM Mono,monospace;font-size:11px;">'+l+'</div><div class="sit-d '+(dv>0?'pos':'neg')+'">'+ds+'</div></div>';});
sitHTML+='</div>';});
sitHTML+='<button class="expand-btn" onclick="this.parentElement.querySelectorAll(\'.sit-grp.hid\').forEach(g=>g.classList.remove(\'hid\'));this.style.display=\'none\';">Show all situations</button></div></div>';}
// Opponent + errors
let oppHTML='';
if(deep){const oi=deep.opponent_exploits||[],ei=deep.error_analysis||[],ri=deep.return_insights||[],sp1w=deep.serve_plus1_wins,sp1l=deep.serve_plus1_losses;
if(oi.length||ei.length||ri.length||sp1w){
oppHTML='<div class="two-col"><div class="card-box"><div class="ch"><span class="cl">How Opponents Beat '+d.name.split(' ').pop()+'</span></div>';
oppHTML+=oi.map(i=>'<div class="opp-item">'+i.insight+'</div>').join('')||'<div class="note">No significant exploitation patterns (dominant record).</div>';
oppHTML+=ri.map(i=>'<div class="opp-item" style="border-left-color:var(--accent);">'+i.insight+'</div>').join('');
oppHTML+='</div><div class="card-box"><div class="ch"><span class="cl">Error Profile & Serve+1</span></div>';
oppHTML+=ei.map(i=>'<div class="err-item">'+i.insight+'</div>').join('')||'<div class="note">Insufficient error data.</div>';
if(sp1w&&sp1l){oppHTML+='<div style="margin-top:14px;"><div class="cl" style="margin-bottom:8px;">Serve+1 Shot</div><div class="sp1-grid"><div class="sp1-head">Shot</div><div class="sp1-head">In Wins</div><div class="sp1-head">In Losses</div>';
sp1w.slice(0,5).forEach((w,i)=>{oppHTML+='<div>'+w.shot+'</div><div style="font-family:DM Mono,monospace;font-size:11px;">'+P(w.pct)+'</div><div style="font-family:DM Mono,monospace;font-size:11px;">'+(sp1l[i]?P(sp1l[i].pct):'-')+'</div>';});
oppHTML+='</div></div>';}
oppHTML+='</div></div>';}}
document.getElementById('app').innerHTML=
'<div class="hero-grid"><div class="hero-left"><div class="avatar">'+ini(d.name)+'</div><div class="pinfo"><h1>'+d.name+'</h1><div class="meta-row"><span class="mtag"><span class="dot"></span>'+d.charted_matches+' charted matches</span><span class="mtag">'+(d.total_points||0).toLocaleString()+' pts</span></div><div class="meta-row"><span class="mtag">Right-handed</span><span class="mtag">One-handed BH</span></div><div class="rank-row"><span class="rnum">#-</span><span class="rlbl">ATP Rank</span></div></div></div><div class="ins-box"><div class="ins-hdr">Coaching Insights - Win Factor Analysis</div>'+insHTML+'</div></div>'+
'<div class="sf-bar"><button class="sfb on" data-s="all">All Surfaces</button><button class="sfb" data-s="Hard">Hard</button><button class="sfb" data-s="Grass">Grass</button><button class="sfb" data-s="Clay">Clay</button><button class="sf-cmp" onclick="document.getElementById(\'ov\').classList.add(\'show\');document.getElementById(\'ov1\').value=\''+d.name+'\';">Compare Player</button></div>'+
'<div class="tr-grid"><div class="tiles"><div class="tile"><div class="tl">Favorite Shot Pattern</div><div class="tv">'+(p.top_2gram_1||'FF')+'</div><div class="tsub">'+P(p.top_2gram_1_pct||0)+' of rallies - '+dp(p.top_2gram_1||'FF')+'</div></div><div class="tile"><div class="tl">Break Points</div><div class="tv">'+P(bp.converted_pct||0)+'</div><div class="tsub">'+(bp.return_chances||0)+' opportunities - '+P(bp.saved_pct||0)+' saved on serve</div><div class="trk">'+(bp.faced||0)+' faced</div></div><div class="tile"><div class="tl">Match Efficiency</div><div class="tv">'+eff+'</div><div class="tsub">Rally avg '+(serving.avg_rally||0).toFixed(1)+' - Aggression '+P(p.aggression_index||0)+'</div></div></div>'+
'<div class="radar-box"><div class="ri-btn" onclick="document.getElementById(\'rtip\').classList.toggle(\'show\')">i</div><div class="ri-tip" id="rtip"><b>Serve</b>Ace rate scaled<b>Return</b>Return aggression index<b>BP Save</b>Break point save %<b>Aggression</b>Winner/UE ratio<b>Defense</b>Inverse aggression<b>Consistency</b>Pattern diversity<b>Pressure</b>Far behind win %</div><svg viewBox="0 0 340 320" width="100%" height="300">'+renderRadar(radar)+'</svg></div></div>'+
'<div class="sec-pad"><div class="card-box"><div class="ch"><span class="cl">Serve Direction</span></div><div class="srv-g">'+['wide','body','T'].map(dir=>{const val=sv[dir]||0,pr2=dir==='wide'?(p.serve_wide_pct_pressure||0):dir==='T'?(p.serve_t_pct_pressure||0):0,dt=pr2?((pr2-val)*100).toFixed(1):null;return'<div class="srv-b"><div class="srv-d">'+dir+'</div><div class="srv-v">'+P(val)+'</div>'+(dt?'<div class="srv-dt '+(dt>0?'du':'dd')+'">'+(dt>0?'+':'')+dt+'% under BP</div>':'')+'</div>';}).join('')+'</div><div class="note">Entropy: '+(sv.entropy||0).toFixed(3)+' - '+((sv.entropy||0)>1.5?'High unpredictability':'Moderate predictability')+'</div></div></div>'+
'<div class="two-col"><div class="card-box"><div class="ch"><span class="cl">Shot Patterns</span><div class="tgrp"><button class="tog on" id="tStr" onclick="showP(\'s\')">Strengths</button><button class="tog" id="tWk" onclick="showP(\'w\')">Weaknesses</button></div></div><div id="pList">'+strengths.map(r=>'<div class="pr"><div>'+r.n+'</div><div class="pbw"><div class="pb" style="width:'+r.v*100+'%"></div></div><div class="pp">'+P(r.v)+'</div></div>').join('')+'</div></div>'+
'<div class="card-box"><div class="ch"><span class="cl">vs ATP Top 100</span></div><div class="legend"><div class="li"><div class="lsw" style="background:var(--accent)"></div>'+d.name.split(' ').pop()+'</div><div class="li"><div class="lln" style="background:var(--red-soft)"></div>ATP Avg</div></div><div class="asec">Serve</div>'+atpR([{l:'Ace Rate',v:p.ace_rate||0,a:.08,m:.20},{l:'Serve Entropy',v:(p.serve_dir_entropy||0)/1.585,a:.9,m:1},{l:'Short Rally Win',v:p.win_rate_short_rally||0,a:.65,m:1}])+'<div class="asec">Return</div>'+atpR([{l:'Aggression',v:p.aggression_index||0,a:.50,m:1},{l:'Long Rally Win',v:p.win_rate_long_rally||0,a:.50,m:1},{l:'BP Converted',v:bp.converted_pct||0,a:.40,m:1},{l:'BP Saved',v:bp.saved_pct||0,a:.63,m:1}])+'</div></div>'+
sitHTML+oppHTML+
'<div class="sec-pad"><div class="card-box"><div class="ch"><span class="cl">Surface Breakdown</span></div>'+Object.entries(d.surfaces||{}).map(([s,data])=>{const ssv=data.serve_direction||{},rl=data.rally||{};return'<div class="sfr"><div class="sfn">'+s+'</div><div class="sfs"><div class="sl2">Wide</div><div class="sv2">'+P(ssv.wide||0)+'</div></div><div class="sfs"><div class="sl2">Body</div><div class="sv2">'+P(ssv.body||0)+'</div></div><div class="sfs"><div class="sl2">T</div><div class="sv2">'+P(ssv.T||0)+'</div></div><div class="sfs"><div class="sl2">Aggression</div><div class="sv2">'+(rl.aggression?P(rl.aggression):'-')+'</div></div><div class="sfm">'+data.matches+' matches</div></div>';}).join('')+'</div></div>'+
'<div class="footer"><div class="footer-logo"><div class="logo-mark"></div>TennisIQ</div><div class="footer-note">'+d.charted_matches+' matches - '+(d.total_points||0).toLocaleString()+' points - Deep analysis across '+(deep?deep.situational_insights.length:0)+' situations</div></div>';
document.querySelectorAll('.sfb').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.sfb').forEach(x=>x.classList.remove('on'));b.classList.add('on');}));
}
function showP(t){document.getElementById('tStr').classList.toggle('on',t==='s');document.getElementById('tWk').classList.toggle('on',t==='w');const pats=t==='s'?window._str:window._wk;document.getElementById('pList').innerHTML=pats.map(r=>'<div class="pr"><div>'+r.n+'</div><div class="pbw"><div class="pb" style="width:'+Math.min(r.v*100,100)+'%"></div></div><div class="pp">'+P(r.v)+'</div></div>').join('');}
function renderRadar(attrs){const cx=170,cy=155,r=115,n=attrs.length,st=2*Math.PI/n;let s='';
[.33,.66,1].forEach(sc=>{const pts=attrs.map((_,i)=>(cx+r*sc*Math.cos(-Math.PI/2+i*st))+','+(cy+r*sc*Math.sin(-Math.PI/2+i*st))).join(' ');s+='<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.2"/>';});
attrs.forEach((_,i)=>{const a=-Math.PI/2+i*st;s+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a))+'" y2="'+(cy+r*Math.sin(a))+'" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>';});
const dp2=attrs.map((a,i)=>{const v=Math.min(1,a.v/100),ang=-Math.PI/2+i*st;return(cx+r*v*Math.cos(ang))+','+(cy+r*v*Math.sin(ang));}).join(' ');
s+='<polygon points="'+dp2+'" fill="rgba(74,124,111,0.25)" stroke="#4A7C6F" stroke-width="2.5"/>';
attrs.forEach((a,i)=>{const v=Math.min(1,a.v/100),ang=-Math.PI/2+i*st,dx=cx+r*v*Math.cos(ang),dy=cy+r*v*Math.sin(ang);
s+='<circle cx="'+dx+'" cy="'+dy+'" r="3.5" fill="#4A7C6F" stroke="white" stroke-width="1.2"/>';
s+='<text x="'+(dx+(Math.cos(ang)>0?8:-8))+'" y="'+(dy-6)+'" text-anchor="'+(Math.cos(ang)>0?'start':'end')+'" fill="rgba(255,255,255,0.7)" font-size="8" font-family="DM Mono,monospace">'+Math.round(a.v)+'</text>';
const lx=cx+(r+18)*Math.cos(ang),ly=cy+(r+18)*Math.sin(ang),anch=Math.abs(Math.cos(ang))<0.3?'middle':Math.cos(ang)>0?'start':'end';
s+='<text x="'+lx+'" y="'+(ly+3)+'" text-anchor="'+anch+'" fill="rgba(255,255,255,0.6)" font-size="8.5" font-family="DM Mono,monospace" letter-spacing="0.5"><title>'+a.tip+'</title>'+a.l.toUpperCase()+'</text>';});return s;}
function atpR(rows){return rows.map(r=>{const pw=Math.min(100,(r.v/r.m)*100),ap=Math.min(100,(r.a/r.m)*100);return'<div class="ar"><div class="albl">'+r.l+'</div><div class="abw"><div class="abf" style="width:'+pw+'%"></div><div class="aam" style="left:'+ap+'%"></div></div><div class="aval">'+(r.v<1?P(r.v):r.v.toFixed(2))+'</div></div>';}).join('');}
load();
</script>
