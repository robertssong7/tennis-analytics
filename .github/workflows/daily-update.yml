name: Daily Data Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests openpyxl xlrd scipy

      - name: Pull latest Sackmann data
        run: |
          if [ -d data/sackmann/tennis_atp/.git ]; then
            cd data/sackmann/tennis_atp
            git pull origin master || git pull origin main || echo "Sackmann pull failed"
            cd ../../..
          else
            echo "Sackmann is not a git repo locally; skipping pull (files are direct)."
          fi

      - name: Refresh supplement (tennis-data.co.uk)
        run: python3 -u tools/refresh_supplement_data.py || echo "Supplement refresh failed"

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "TennisIQ Bot"
          git config user.email "tennisiq-bot@users.noreply.github.com"
          git commit -m "Daily data update — $(date +%Y-%m-%d)"
          git push origin main

      - name: Refresh live tournament metadata
        if: success()
        run: python3 -u tools/refresh_live_tournament.py || echo "Live tournament refresh failed"

      - name: Recompute percentile rankings
        if: success()
        run: python3 -u tools/compute_percentiles.py || echo "Percentile compute failed"

      - name: Recompute model accuracy history
        if: success()
        run: python3 -u tools/compute_model_accuracy.py || echo "Model accuracy compute failed"

      - name: Compute active players
        if: success()
        run: python3 -u tools/compute_active_players.py || echo "Active players compute failed"

      - name: Precompute historical trends
        if: success()
        run: python3 -u tools/precompute_historical_trends.py || echo "Historical trends precompute failed"

      - name: Mine stat candidates
        if: success()
        run: python3 -u tools/mine_stat_candidates.py || echo "Stat candidate mining failed"

      - name: Generate stat of the day
        if: success()
        run: python3 -u tools/generate_stat_of_the_day.py || echo "Stat of day generation failed"

      - name: Re-commit downstream artifacts
        if: success()
        run: |
          git add data/processed/active_players.json data/processed/historical_trends.json data/processed/stat_candidates.json data/processed/stat_of_the_day.json data/processed/stat_history.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no downstream artifact changes"
          else
            git config user.name "TennisIQ Bot"
            git config user.email "tennisiq-bot@users.noreply.github.com"
            git commit -m "Daily downstream artifacts — $(date +%Y-%m-%d)"
            git push origin main
          fi

      - name: Sync frontend to S3
        if: success()
        run: aws s3 sync frontend/public/dashboard/ s3://tennisiq-frontend/ --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Invalidate CloudFront
        if: success()
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
