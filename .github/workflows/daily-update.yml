name: Daily Data Update

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests openpyxl xlrd

      - name: Pull latest Sackmann data
        run: |
          cd data/sackmann/tennis_atp
          git pull origin master || git pull origin main || echo "Sackmann pull failed"
          cd ../../..

      - name: Run match scraper
        run: python3 -u scripts/scrape_atp_results.py || echo "Scraper failed"

      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "TennisIQ Bot"
          git config user.email "tennisiq-bot@users.noreply.github.com"
          git commit -m "Daily data update — $(date +%Y-%m-%d)"
          git push origin main

      - name: Refresh live tournament metadata
        if: success()
        run: python3 -u tools/refresh_live_tournament.py || echo "Live tournament refresh failed"

      - name: Sync frontend to S3
        if: success()
        run: aws s3 sync frontend/public/dashboard/ s3://tennisiq-frontend/ --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Invalidate CloudFront
        if: success()
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
