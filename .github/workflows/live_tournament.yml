name: live-tournament-state

on:
  schedule:
    - cron: '0 */2 * * *'  # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: live-tournament-state
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyarrow

      - name: Run scraper
        run: |
          cd tools/live_tournament
          python scraper.py

      - name: Commit refreshed state
        run: |
          /usr/bin/git config user.name "live-tournament-bot"
          /usr/bin/git config user.email "bot@tennisiq.app"
          /usr/bin/git add data/live/ data/processed/live_matches_ingest.parquet 2>/dev/null || true
          if /usr/bin/git diff --cached --quiet; then
            echo "no live-tournament changes to commit"
            exit 0
          fi
          /usr/bin/git commit -m "feat(live): refresh tournament state $(date -u +%Y-%m-%dT%H:%MZ)"
          /usr/bin/git push
